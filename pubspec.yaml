name: padeltour
description: App for creating and managing padel tournaments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.4.0

  # Navigation
  go_router: ^14.0.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Linting
  very_good_analysis: ^6.0.0

  # Testing
  mocktail: ^1.0.4
